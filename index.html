<head>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f0eb; color: #2c2c2c; }

    header {
      background: #2c2c2c; color: #fff;
      text-align: center; padding: 20px;
    }
    header h1 { font-size: 24px; letter-spacing: 2px; }
    header p { font-size: 13px; color: #ccc; margin-top: 5px; }

    .name-block {
      max-width: 500px; margin: 20px auto; padding: 0 16px;
    }
    .name-block input {
      width: 100%; padding: 12px; border: 2px solid #c8a96e;
      border-radius: 8px; font-size: 16px; outline: none;
    }
    .name-block label { display: block; margin-bottom: 6px; font-weight: bold; }

    .categories {
      display: flex; flex-wrap: wrap; gap: 8px;
      max-width: 900px; margin: 20px auto; padding: 0 16px;
    }
    .cat-btn {
      padding: 8px 16px; border: none; background: #2c2c2c;
      color: #fff; border-radius: 20px; cursor: pointer; font-size: 13px;
    }
    .cat-btn:hover, .cat-btn.active { background: #c8a96e; }

    .menu-section { display: none; max-width: 900px; margin: 0 auto; padding: 0 16px 20px; }
    .menu-section.visible { display: block; }
    .menu-section h2 {
      font-size: 18px; margin-bottom: 16px; padding-bottom: 6px;
      border-bottom: 2px solid #c8a96e; color: #2c2c2c;
    }

    .dishes { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    .dish {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s;
    }
    .dish:hover { transform: translateY(-2px); }
    .dish img {
      width: 100%; height: 150px; object-fit: cover;
      background: #eee;
    }
    .dish-info { padding: 12px; }
    .dish-name { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
    .dish-desc { font-size: 11px; color: #888; margin-bottom: 8px; line-height: 1.4; }
    .dish-price { font-size: 15px; font-weight: bold; color: #c8a96e; margin-bottom: 10px; }

    .qty-control { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 30px; height: 30px; border: none; border-radius: 50%;
      background: #2c2c2c; color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: #c8a96e; }
    .qty-num { font-size: 16px; font-weight: bold; min-width: 20px; text-align: center; }

    .order-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #2c2c2c; color: #fff;
      padding: 14px 20px; display: flex; justify-content: space-between; align-items: center;
      z-index: 100;
    }
    .order-bar span { font-size: 14px; }
    .order-bar button {
      background: #c8a96e; color: #fff; border: none;
      padding: 10px 24px; border-radius: 20px; font-size: 14px;
      cursor: pointer; font-weight: bold;
    }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      justify-content: center; align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; padding: 24px;
      max-width: 480px; width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .modal h2 { margin-bottom: 16px; font-size: 20px; }
    .modal-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 14px; }
    .modal-total { font-size: 16px; font-weight: bold; margin-top: 12px; color: #c8a96e; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns button {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer; font-weight: bold;
    }
    .btn-cancel { background: #eee; color: #333; }
    .btn-send { background: #c8a96e; color: #fff; }

    .success {
      display: none; text-align: center; padding: 40px 20px;
      max-width: 400px; margin: 40px auto;
    }
    .success.show { display: block; }
    .success h2 { font-size: 22px; margin-bottom: 10px; }
    .success p { color: #666; }
    .success .emoji { font-size: 60px; margin-bottom: 16px; }

    footer { height: 80px; }
  </style>
</head>

<header>

<div id="menu-container"></div>

</div>

<div class="modal-overlay" id="modalOverlay">

    <div class="modal-total" id="modalTotal"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Назад</button>
      <button class="btn-send" onclick="sendOrder()">Отправить ✉️</button>
    </div>
  </div>
</div>

<div class="success" id="successBlock">
  <div class="emoji">🎉</div>
  <h2>Заказ отправлен!</h2>
  <p>Организатор получил твой выбор. Увидимся в Лукуме!</p>
</div>

// --- State ---
const cart = {};

// --- Render ---
function render() {
  const catContainer = document.getElementById("categories");
  const menuContainer = document.getElementById("menu-container");
  catContainer.innerHTML = "";
  menuContainer.innerHTML = "";

  menuData.forEach((section, i) => {
    // Кнопка категории
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (i === 0 ? " active" : "");
    btn.textContent = section.category;
    btn.onclick = () => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".menu-section").forEach(s => s.classList.remove("visible"));
      document.getElementById("sec-" + i).classList.add("visible");
    };
    catContainer.appendChild(btn);

    // Секция
    const sec = document.createElement("div");
    sec.className = "menu-section" + (i === 0 ? " visible" : "");
    sec.id = "sec-" + i;

    const h2 = document.createElement("h2");
    h2.textContent = section.category;
    sec.appendChild(h2);

    const grid = document.createElement("div");
    grid.className = "dishes";

    section.items.forEach(item => {
      const card = document.createElement("div");
      card.className = "dish";
      card.innerHTML = `
        <img src="${item.photo || 'https://placehold.co/300x150/f5f0eb/c8a96e?text=🍽'}" alt="${item.name}" onerror="this.src='https://placehold.co/300x150/f5f0eb/c8a96e?text=🍽'"/>
        <div class="dish-info">
          <div class="dish-name">${item.name}</div>
          <div class="dish-desc">${item.desc}</div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${item.id}', -1, ${item.price}, '${item.name}')">−</button>
            <span class="qty-num" id="qty-${item.id}">${cart[item.id]?.qty || 0}</span>
            <button class="qty-btn" onclick="changeQty('${item.id}', 1, ${item.price}, '${item.name}')">+</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    menuContainer.appendChild(sec);
  });
}

function changeQty(id, delta, price, name) {
  if (!cart[id]) cart[id] = { qty: 0, price, name };
  cart[id].qty = Math.max(0, cart[id].qty + delta);
  if (cart[id].qty === 0) delete cart[id];
  document.getElementById("qty-" + id).textContent = cart[id]?.qty || 0;
  updateBar();
}

function updateBar() {
  const total = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  const bar = document.getElementById("orderBar");
  bar.style.display = total > 0 ? "flex" : "none";
  document.getElementById("orderCount").textContent = `Выбрано: ${total} блюд`;
}

function openModal() {
  const items = Object.values(cart);
  if (items.length === 0) return;
  let html = "";
  items.forEach(i => {
    html += `<div class="modal-item"><span>${i.name} × ${i.qty}</span></div>`;
  });
  document.getElementById("modalItems").innerHTML = html;
  document.getElementById("modalTotal").textContent = ""; // убрали "Итого"
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

async function sendOrder() {
  const name = document.getElementById("guestName").value.trim();
  if (!name) { alert("Введи своё имя!"); closeModal(); return; }

  const items = Object.values(cart);
  if (items.length === 0) return;

  let text = `🍽 *Заказ от ${name}*\n\n`;
  let total = 0;
  items.forEach(i => {
    text += `• ${i.name} × ${i.qty} — ${i.price * i.qty} руб.\n`;
    total += i.price * i.qty;
  });
  text += `\n💵 *Итого: ${total} руб.*`;

  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text, parse_mode: "Markdown" })
    });
    closeModal();
    document.getElementById("menu-container").style.display = "none";
    document.getElementById("categories").style.display = "none";
    document.getElementById("orderBar").style.display = "none";
    document.getElementById("successBlock").classList.add("show");
  } catch(e) {
    alert("Ошибка отправки. Попробуй ещё раз.");
  }
}

render();
</script>
